# Milvus standalone stack: etcd + minio + milvus.
# Milvus 单机栈：etcd + minio + milvus。
apiVersion: v1
kind: Service
metadata:
  name: etcd
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: etcd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: etcd
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ling-shu
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ling-shu
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          imagePullPolicy: IfNotPresent
          command:
            - etcd
            - -advertise-client-urls=http://127.0.0.1:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - name: client
              containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ling-shu
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ling-shu
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2023-03-20T20-16-18Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/minio_data"]
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ling-shu-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ling-shu-secret
                  key: MINIO_SECRET_KEY
          ports:
            - name: api
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /minio_data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: milvus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: grpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milvus
  labels:
    app.kubernetes.io/name: ling-shu
    app.kubernetes.io/component: milvus
spec:
  serviceName: milvus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ling-shu
      app.kubernetes.io/component: milvus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ling-shu
        app.kubernetes.io/component: milvus
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.2.9
          imagePullPolicy: IfNotPresent
          command: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: etcd:2379
            - name: MINIO_ADDRESS
              value: minio:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ling-shu-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ling-shu-secret
                  key: MINIO_SECRET_KEY
          ports:
            - name: grpc
              containerPort: 19530
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
