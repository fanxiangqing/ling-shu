apiVersion: v1
kind: ConfigMap
metadata:
  name: ling-shu-config
data:
  LING_SHU_APP_ENV: "production"
  LING_SHU_SERVER_HOST: "0.0.0.0"
  LING_SHU_SERVER_PORT: "8080"
  LING_SHU_SERVER_MODE: "release"
  LING_SHU_LOG_LEVEL: "info"
  LING_SHU_LOG_ENCODING: "json"
  LING_SHU_LOG_CONSOLE_ENABLED: "true"
  LING_SHU_LOG_FILE_ENABLED: "false"
  LING_SHU_REDIS_ENABLED: "true"
  LING_SHU_REDIS_ADDR: "redis.default.svc.cluster.local:6379"
  LING_SHU_REDIS_DB: "0"
  LING_SHU_REDIS_RATE_LIMIT_ENABLED: "true"
  LING_SHU_REDIS_RATE_LIMIT_REQUESTS: "120"
  LING_SHU_REDIS_RATE_LIMIT_WINDOW: "1m"
  LING_SHU_REDIS_QUERY_LOCK_ENABLED: "true"
  LING_SHU_REDIS_QUERY_LOCK_TTL: "30s"
  LING_SHU_REDIS_METADATA_CACHE_ENABLED: "true"
  LING_SHU_REDIS_METADATA_CACHE_TTL: "10m"
  LING_SHU_MILVUS_ENABLED: "true"
  LING_SHU_MILVUS_ADDR: "milvus.default.svc.cluster.local:19530"
  LING_SHU_MILVUS_COLLECTION: "ling_shu_kb_chunks"
  LING_SHU_MILVUS_DIMENSION: "1024"
  LING_SHU_ASR_ENABLED: "false"
  LING_SHU_TTS_ENABLED: "false"

